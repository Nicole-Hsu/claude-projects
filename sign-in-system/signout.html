<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>活動簽退</title>
<style>
:root {
  --bg: #f5f0eb;
  --card: #ffffff;
  --accent: #5a7ec4;
  --accent-dark: #3d5fa0;
  --accent-light: #dce6f5;
  --warn: #d96060;
  --text: #2d2420;
  --text-mid: #6b5c54;
  --text-dim: #a08880;
  --border: rgba(0,0,0,.10);
  --shadow: 0 2px 12px rgba(0,0,0,.10), 0 1px 3px rgba(0,0,0,.06);
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; background: var(--bg); font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; color: var(--text); }
body {
  background-image:
    radial-gradient(ellipse at 10% 10%, rgba(100,140,210,.16) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 85%, rgba(200,160,220,.14) 0%, transparent 50%);
}

#header {
  background: linear-gradient(135deg, #5a7ec4, #3d5fa0);
  color: #fff;
  padding: 20px 20px 16px;
  text-align: center;
  box-shadow: 0 3px 12px rgba(61,95,160,.35);
}
#header .event-label { font-size: .78rem; opacity: .8; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
#header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: .04em; }
#header .event-date { font-size: .82rem; opacity: .75; margin-top: 5px; }

#mainCard {
  margin: 24px 14px 30px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 26px 18px 28px;
}
#mainCard h2 { font-size: 1rem; color: var(--text-mid); font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 7px; }
#mainCard h2::before { content: ''; display: block; width: 4px; height: 18px; background: var(--accent); border-radius: 2px; }

.field { margin-bottom: 18px; }
.field label { display: block; font-size: .82rem; font-weight: 600; color: var(--text-mid); margin-bottom: 6px; letter-spacing: .04em; }
.field input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 1.3rem;
  font-family: inherit;
  letter-spacing: .18em;
  color: var(--text);
  background: #fafafa;
  text-transform: uppercase;
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
  text-align: center;
}
.field input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
  background: #fff;
}
.field input.error { border-color: var(--warn); }
.field .hint { font-size: .75rem; color: var(--text-dim); margin-top: 5px; text-align: center; }

.err-msg { color: var(--warn); font-size: .82rem; margin-top: 5px; display: none; text-align: center; }
.err-msg.show { display: block; }

/* 查到的姓名確認框 */
#nameConfirm {
  display: none;
  background: var(--accent-light);
  border: 1.5px solid var(--accent);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  margin-bottom: 18px;
}
#nameConfirm.show { display: block; }
#nameConfirm .label { font-size: .8rem; color: var(--accent-dark); margin-bottom: 6px; }
#nameConfirm .name { font-size: 1.4rem; font-weight: 700; color: var(--accent-dark); }
#nameConfirm .signedin { font-size: .8rem; color: var(--text-mid); margin-top: 4px; }

#submitBtn {
  display: block;
  width: 100%;
  padding: 15px;
  background: linear-gradient(145deg, #6e90d0, #5a7ec4);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 1.1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(90,126,196,.4);
  transition: all .2s;
  letter-spacing: .05em;
}
#submitBtn:active { transform: scale(.97); }
#submitBtn:disabled { background: #aaa; box-shadow: none; cursor: not-allowed; }

/* 成功畫面 */
#successScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #5a7ec4, #3d5fa0);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  text-align: center;
  z-index: 999;
  padding: 30px;
}
#successScreen.show { display: flex; }
.success-icon { font-size: 5rem; margin-bottom: 20px; animation: pop .5s cubic-bezier(.2,1.4,.5,1); }
#successScreen h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; }
#successScreen .name-display { font-size: 1.4rem; font-weight: 700; background: rgba(255,255,255,.2); border-radius: 12px; padding: 12px 24px; margin-bottom: 14px; }
#successScreen .time-display { font-size: .9rem; opacity: .8; }
@keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

.back-link { text-align: center; padding-bottom: 10px; }
.back-link a { font-size: .75rem; color: var(--text-dim); text-decoration: none; }
</style>
</head>
<body>

<div id="header">
  <div class="event-label">活動簽退</div>
  <h1 id="eventTitle">研討會暨培訓課程</h1>
  <div class="event-date" id="eventDate"></div>
</div>

<div id="mainCard">
  <h2>輸入簽退碼</h2>

  <div class="field">
    <label>您的簽退碼</label>
    <input type="text" id="fCode" placeholder="XXXXXX" maxlength="6" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="hint">請輸入簽到後收到的 6 位英數字碼</div>
    <div class="err-msg" id="errCode">找不到此簽退碼，請確認後再試</div>
  </div>

  <div id="nameConfirm">
    <div class="label">確認簽退人員</div>
    <div class="name" id="confirmName"></div>
    <div class="signedin" id="confirmSignedin"></div>
  </div>

  <button id="submitBtn" onclick="handleSubmit()">查詢</button>
</div>

<div class="back-link">
  <a href="index.html">返回簽到頁</a>
</div>

<!-- 成功畫面 -->
<div id="successScreen">
  <div class="success-icon">👋</div>
  <h2>簽退成功！</h2>
  <div class="name-display" id="successName"></div>
  <div class="time-display" id="successTime"></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzRhAY3Py9gLV5yUF_TpRxo7jTs-yPnfHUnnM4CSmmrcmDNMw4GfxEeR2E7t_8PjacU/exec';
const EVENT_NAME = '照顧服務員術科培訓研討會';
const EVENT_DATE = '2026年6月2日';

document.getElementById('eventTitle').textContent = EVENT_NAME;
document.getElementById('eventDate').textContent = EVENT_DATE;

// 從 URL 帶入簽退碼
const urlCode = new URLSearchParams(location.search).get('code');
if (urlCode) {
  document.getElementById('fCode').value = urlCode.toUpperCase();
  // 自動查詢
  window.addEventListener('load', () => lookup());
}

// 強制大寫
document.getElementById('fCode').addEventListener('input', function() {
  this.value = this.value.toUpperCase();
});

let state = 'lookup'; // 'lookup' | 'confirm'

async function handleSubmit() {
  if (state === 'lookup') {
    await lookup();
  } else {
    await signout();
  }
}

async function lookup() {
  const code = document.getElementById('fCode').value.trim();
  if (!code || code.length < 4) {
    showErr('請輸入簽退碼');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '查詢中…';
  hideErr();

  try {
    const res = await fetch(SCRIPT_URL + '?action=lookup&code=' + encodeURIComponent(code));
    const data = await res.json();
    if (data.found) {
      document.getElementById('confirmName').textContent = data.name;
      document.getElementById('confirmSignedin').textContent = '簽到時間：' + data.signedin;
      document.getElementById('nameConfirm').classList.add('show');
      btn.textContent = '確認簽退';
      btn.disabled = false;
      state = 'confirm';
    } else {
      showErr('找不到此簽退碼，請確認後再試');
      btn.textContent = '查詢';
      btn.disabled = false;
    }
  } catch(e) {
    showErr('網路錯誤，請稍後再試');
    btn.textContent = '查詢';
    btn.disabled = false;
  }
}

async function signout() {
  const code = document.getElementById('fCode').value.trim();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '簽退中…';

  try {
    const res = await fetch(SCRIPT_URL + '?action=signout&code=' + encodeURIComponent(code));
    const data = await res.json();
    if (data.ok) {
      document.getElementById('successName').textContent = data.name + ' 已完成簽退';
      document.getElementById('successTime').textContent = '簽退時間：' + data.time;
      document.getElementById('successScreen').classList.add('show');
    } else {
      showErr(data.msg || '簽退失敗，請洽工作人員');
      btn.textContent = '確認簽退';
      btn.disabled = false;
    }
  } catch(e) {
    showErr('網路錯誤，請稍後再試');
    btn.textContent = '確認簽退';
    btn.disabled = false;
  }
}

function showErr(msg) {
  const el = document.getElementById('errCode');
  el.textContent = msg;
  el.classList.add('show');
}
function hideErr() {
  document.getElementById('errCode').classList.remove('show');
}
</script>
</body>
</html>
