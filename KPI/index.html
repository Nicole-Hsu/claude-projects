<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KPI 填報</title>
<style>
:root{
  --sw:220px;
  --rw:220px;
  --navy:#1e293b; --navy-h:rgba(255,255,255,.06);
  --blue:#2563eb; --blue-l:#eff6ff; --blue-b:#bfdbfe;
  --green:#16a34a; --green-l:#f0fdf4; --green-b:#bbf7d0;
  --amber:#d97706; --amber-l:#fefce8; --amber-b:#fde68a;
  --red:#dc2626; --red-l:#fef2f2;
  --purple:#7c3aed; --purple-l:#f5f3ff; --purple-b:#ede9fe;
  --bg:#f8fafc; --card:#fff; --border:#e2e8f0;
  --text:#1e293b; --muted:#64748b;
  --fs:15px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Microsoft JhengHei','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:var(--fs);display:flex;min-height:100vh;}
a{color:var(--blue);text-decoration:none;}a:hover{text-decoration:underline;}

/* ── Sidebar ── */
#sb{width:var(--sw);background:var(--navy);color:#cbd5e1;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;display:flex;flex-direction:column;flex-shrink:0;}
#sb-logo{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08);}
#sb-logo .lg{width:30px;height:30px;background:#f59e0b;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
#sb-logo span{font-size:.78rem;font-weight:700;color:#fff;line-height:1.35;}
.sb-sec{padding:14px 16px 4px;font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:#475569;font-weight:600;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .12s;color:#94a3b8;position:relative;}
.sb-item:hover{background:var(--navy-h);color:#e2e8f0;}
.sb-item.active{background:var(--blue);color:#fff;}
.sb-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
.sb-name{flex:1;font-size:.84rem;line-height:1.3;}
.sb-cnt{background:rgba(255,255,255,.15);color:#e2e8f0;font-size:.7rem;padding:2px 7px;border-radius:99px;font-weight:700;}
.sb-item.active .sb-cnt{background:rgba(255,255,255,.3);}

/* ── Main ── */
#main{margin-left:var(--sw);margin-right:var(--rw);flex:1;display:flex;flex-direction:column;min-height:100vh;}

/* ── Right Panel ── */
#rp-resize{position:fixed;right:calc(var(--rw) - 4px);top:0;bottom:0;width:8px;cursor:col-resize;z-index:200;}
#rp-resize:hover,#rp-resize.dragging{background:rgba(99,102,241,.35);}
#rpanel{width:var(--rw);background:#f0f4ff;border-left:1px solid var(--border);position:fixed;top:0;right:0;bottom:0;overflow-y:auto;z-index:90;display:flex;flex-direction:column;}
#rp-hdr{padding:14px 14px 10px;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);background:#f0f4ff;position:sticky;top:0;z-index:1;}
#rp-hdr span{font-size:1rem;font-weight:700;color:var(--navy);display:block;text-transform:none;letter-spacing:0;}
#rp-body{flex:1;overflow-y:auto;padding-bottom:20px;}
.rp-wi{padding:9px 12px 5px;}
.rp-wi-name{font-size:.73rem;font-weight:700;color:var(--navy);margin-bottom:4px;line-height:1.4;}
.rp-link{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:6px;font-size:.82rem;color:var(--blue);text-decoration:none;margin-bottom:2px;transition:background .1s;}
.rp-link:hover{background:var(--blue-l);}
.rp-sum{color:var(--green);}
.rp-sum:hover{background:var(--green-l);}
.rp-div{height:1px;background:var(--border);margin:2px 0;}
@media(max-width:900px){#rpanel{display:none;}#rp-resize{display:none;}#main{margin-right:0;}}

/* ── Top Bar ── */
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:6px;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.tb-sp{flex:1;}
.tb-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.8rem;color:var(--text);display:flex;align-items:center;gap:4px;font-family:inherit;transition:all .12s;}
.tb-btn:hover{background:#f1f5f9;border-color:#94a3b8;}
.tb-green{background:var(--green);color:#fff;border-color:var(--green);}
.tb-green:hover{background:#15803d;}
.tb-div{width:1px;height:18px;background:var(--border);margin:0 2px;}

/* ── Content ── */
#cnt{padding:20px 24px;flex:1;}

/* ── Group Header ── */
#ghdr{margin-bottom:14px;}
#ghdr h2{font-size:1.2rem;font-weight:700;margin-bottom:3px;}
#ghdr .gsub{font-size:.83rem;color:var(--muted);}
.rate{color:var(--green);font-weight:700;}

/* ── Filter Bar ── */
#fbar{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.flabel{font-size:.78rem;color:var(--muted);white-space:nowrap;font-weight:600;}
.fsearch{display:flex;align-items:center;gap:5px;background:#f8fafc;border:1px solid var(--border);border-radius:6px;padding:5px 10px;}
.fsearch input{border:none;background:transparent;outline:none;font-size:.83rem;font-family:inherit;width:120px;color:var(--text);}
.stbtn{padding:4px 11px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .12s;}
.stbtn:hover{border-color:var(--blue);color:var(--blue);}
.st-all{background:var(--blue);color:#fff;border-color:var(--blue);}
.st-pend{background:#fef3c7;color:#92400e;border-color:#fde68a;}
.st-done{background:#dcfce7;color:#15803d;border-color:#86efac;}
.npill{padding:3px 9px;border-radius:99px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.75rem;font-family:inherit;transition:all .12s;}
.npill:hover,.npill.on{background:var(--blue-l);border-color:var(--blue);color:var(--blue);}
.fdiv{width:1px;height:16px;background:var(--border);}

/* ── Stat pills (next to group title) ── */
#stats{display:flex;gap:5px;}
.spill{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.8rem;font-weight:700;transition:all .12s;white-space:nowrap;}
.spill:hover{background:#f1f5f9;border-color:#94a3b8;}
.sblue{color:var(--blue);} .sgreen{color:var(--green);} .samber{color:var(--amber);}
/* Band purple */
.band-purple{background:var(--purple-l);}

/* ── WI Card ── */
.wcard{background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:box-shadow .15s;}
.wcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}
.whead{padding:12px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;}
.wnum{width:28px;height:28px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;margin-top:1px;}
.winfo{flex:1;}
.wtitle{font-size:.93rem;font-weight:700;line-height:1.4;}
.wppl{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center;}
.pchip{display:flex;align-items:center;gap:3px;font-size:.76rem;color:var(--muted);}
.pav{width:18px;height:18px;background:#e0e7ff;color:#4338ca;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;flex-shrink:0;}
.wbadge{font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:99px;flex-shrink:0;}
.bdone{color:#15803d;background:#dcfce7;}
.bpend{color:#92400e;background:#fef3c7;}

/* ── Card Body ── */
.wbody{display:none;}
.wcard.open .wbody{display:block;}

/* ── Bands ── */
.band{padding:10px 16px;display:flex;align-items:flex-start;gap:10px;border-top:1px solid var(--border);}
.band-blue{background:var(--blue-l);}
.band-amber{background:var(--amber-l);}
.band-green{background:var(--green-l);}
.bico{font-size:.9rem;flex-shrink:0;margin-top:1px;width:20px;text-align:center;}
.bcnt{flex:1;}
.btitle{font-size:.92rem;font-weight:700;color:var(--blue);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.band-toggle{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.7rem;padding:0 2px;font-family:inherit;letter-spacing:0;text-transform:none;font-weight:400;flex-shrink:0;}
.band-toggle:hover{color:var(--blue);}
.band.band-closed .bcnt>*{display:none!important;}
.band.band-closed .bcnt>.btitle{display:flex!important;}
.band.band-closed .btitle{margin-bottom:0;}

/* KPI inline */
.krow{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px dashed var(--blue-b);font-size:.84rem;}
.krow:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ktext{flex:1;color:#1e40af;font-weight:500;}
.ktag{background:#fef3c7;color:#92400e;font-size:.68rem;padding:1px 6px;border-radius:99px;white-space:nowrap;}
.ktgt{color:var(--green);font-size:.78rem;white-space:nowrap;}
.kact{display:flex;gap:3px;flex-shrink:0;}

/* Form pills */
.fpills{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;}
.fpill{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:8px;border:1px solid #c9973e;background:linear-gradient(180deg,#fffbf0 0%,#fef3c7 100%);box-shadow:0 3px 0 0 #b07830,0 2px 5px rgba(0,0,0,.12);font-size:.76rem;color:#92400e;text-decoration:none;cursor:pointer;font-family:inherit;transition:all .1s;font-weight:500;}
.fpill:hover{background:linear-gradient(180deg,#fef9e0 0%,#fde68a 100%);box-shadow:0 4px 0 0 #b07830,0 3px 7px rgba(0,0,0,.14);}
.fpill:active{transform:translateY(2px);box-shadow:0 0 0 0 #b07830,0 1px 2px rgba(0,0,0,.1);}
.fpill-sum{background:linear-gradient(180deg,#f0fdf4 0%,#d1fae5 100%);border-color:#34d399;box-shadow:0 3px 0 0 #059669,0 2px 5px rgba(0,0,0,.1);color:#065f46;}
.fpill-sum:hover{background:linear-gradient(180deg,#dcfce7 0%,#bbf7d0 100%);box-shadow:0 4px 0 0 #059669,0 3px 7px rgba(0,0,0,.12);}

/* Exec entries */
.eentry{font-size:.83rem;margin-bottom:6px;padding-bottom:6px;border-bottom:1px dashed var(--green-b);}
.eentry:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.emeta{font-size:.7rem;color:var(--muted);margin-bottom:2px;}
.etext{white-space:pre-wrap;line-height:1.5;}
.ep2{background:#fff;border:1px solid var(--green-b);border-radius:6px;padding:8px 10px;margin-bottom:6px;}
.ep2-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}

/* Exec add form */
.eadd{background:var(--green-l);border-top:1px solid var(--green-b);padding:12px 16px;}
.eadd-title{font-size:.92rem;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}
.erow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.erow input,.erow select{padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:.8rem;font-family:inherit;background:#fff;}
.eta{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:.82rem;font-family:inherit;resize:vertical;min-height:58px;margin-bottom:6px;}

/* Move row */
.mvrow{display:flex;align-items:center;gap:6px;padding:7px 16px;background:#f0fdf4;border-top:1px solid var(--green-b);flex-wrap:wrap;}
.cblbl{display:flex;align-items:center;gap:4px;font-size:.76rem;cursor:pointer;}

/* Footer */
.wftr{padding:8px 16px;display:flex;justify-content:flex-end;gap:6px;border-top:1px solid var(--border);background:#fafafa;}
.fbtn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.79rem;font-family:inherit;display:flex;align-items:center;gap:4px;transition:all .12s;}
.fbtn:hover{background:#f1f5f9;border-color:#94a3b8;}
.fbtn-p{background:var(--blue);color:#fff;border-color:var(--blue);}
.fbtn-p:hover{background:#1d4ed8;}
.fbtn-d{color:var(--red);}
.fbtn-d:hover{background:var(--red-l);border-color:var(--red);}

/* Planned panel */
.ppanel{display:none;border-top:1px solid #e0e7ff;background:#f8f7ff;padding:14px 16px;}
.ppanel.open{display:block;}
.psec{margin-bottom:14px;}
.psec-title{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.ptag{display:inline-flex;align-items:center;gap:3px;font-size:.78rem;padding:2px 8px;border-radius:99px;margin:2px;}

/* Inline add rows */
.arow{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;align-items:flex-start;}
.arow input,.arow select,.arow textarea{padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:.79rem;font-family:inherit;}
.arow textarea{resize:vertical;min-height:48px;flex:1;}

/* Buttons */
.btn{padding:4px 10px;border-radius:5px;border:none;cursor:pointer;font-size:.77rem;font-weight:600;font-family:inherit;}
.btn-p{background:var(--blue);color:#fff;}
.btn-p:hover{background:#1d4ed8;}
.btn-d{background:var(--red-l);color:var(--red);}
.btn-d:hover{background:#fee2e2;}
.btn-o{background:#fff;border:1px solid var(--border);color:var(--text);}
.btn-o:hover{background:#f1f5f9;}
.btn-g{background:var(--green);color:#fff;}
.btn-g:hover{background:#15803d;}
.btn-sm{padding:2px 7px;font-size:.72rem;}
.btn-add{display:flex;align-items:center;gap:3px;padding:4px 9px;border-radius:5px;border:1px dashed;cursor:pointer;font-size:.76rem;font-family:inherit;}

/* Tables */
.stbl{width:100%;border-collapse:collapse;font-size:.8rem;}
.stbl th{background:#f8fafc;padding:5px 8px;text-align:left;border-bottom:1px solid var(--border);font-weight:600;font-size:.72rem;color:var(--muted);}
.stbl td{padding:5px 8px;border-bottom:1px solid #f1f5f9;vertical-align:top;line-height:1.4;}
.stbl tr:last-child td{border-bottom:none;}

/* Dashboard */
#dview{display:none;}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:18px;}
.dc{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;}
.dbig{font-size:1.9rem;font-weight:700;line-height:1;}
.dlbl{font-size:.77rem;color:var(--muted);margin-top:3px;}
.brow{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.bouter{background:#e2e8f0;border-radius:99px;height:9px;overflow:hidden;}
.binner{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),#15803d);transition:width .5s;}
.bstats{font-size:.73rem;color:var(--muted);margin-top:4px;display:flex;gap:10px;}

/* Loading/Empty */
.ld{text-align:center;padding:32px;color:var(--muted);}
.emp{text-align:center;padding:20px;color:var(--muted);font-size:.83rem;}
.sp{display:inline-block;width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:10px 18px;border-radius:8px;font-size:.84rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px;}
#toast.show{opacity:1;}

/* Modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;}
.mbg.open{display:flex;}
.modal{background:#fff;border-radius:12px;padding:22px;max-width:510px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h3{font-size:.98rem;font-weight:700;margin-bottom:12px;}
.frow{margin-bottom:9px;}
.frow label{display:block;font-size:.76rem;color:var(--muted);margin-bottom:2px;font-weight:500;}
.frow input,.frow textarea,.frow select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:.84rem;font-family:inherit;}
.frow textarea{resize:vertical;min-height:66px;}
.mact{display:flex;gap:6px;margin-top:14px;justify-content:flex-end;}

/* Sidebar resize handle */
#sb-resize{position:fixed;left:calc(var(--sw) - 4px);top:0;bottom:0;width:8px;cursor:col-resize;z-index:200;}
#sb-resize:hover,#sb-resize.dragging{background:rgba(99,102,241,.35);}

/* Archived card */
.wcard.arch-item{opacity:.5;filter:grayscale(.4);}
.wcard.arch-item .whead{background:#f8f8f8;}

/* Sidebar group actions */
.sb-grp-actions{display:none;gap:2px;margin-left:2px;flex-shrink:0;}
.sb-item:hover .sb-grp-actions{display:flex;}
.sb-grp-btn{background:rgba(255,255,255,.12);border:none;color:#94a3b8;border-radius:4px;padding:1px 5px;cursor:pointer;font-size:.68rem;line-height:1.6;font-family:inherit;}
.sb-grp-btn:hover{background:rgba(255,255,255,.28);color:#e2e8f0;}
.sb-add-grp{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;color:#64748b;font-size:.8rem;border-top:1px solid rgba(255,255,255,.07);margin-top:4px;transition:background .12s;}
.sb-add-grp:hover{color:#94a3b8;background:var(--navy-h);}

/* KPI archive */
.krow-arch{opacity:.38;filter:grayscale(.5);}

/* Responsive */
@media(max-width:720px){
  :root{--sw:0px;}
  #sb{display:none;}
  #main{margin-left:0;}
  #sb-resize{display:none;}
}
</style>
</head>
<body>

<!-- ── Password Overlay ── -->
<div id="pw-overlay" style="position:fixed;inset:0;z-index:9999;background:#1e293b;display:flex;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:36px 40px;text-align:center;width:300px;box-shadow:0 20px 60px rgba(0,0,0,.4)">
    <div style="font-size:2rem;margin-bottom:8px">🔐</div>
    <div style="font-size:1.1rem;font-weight:700;margin-bottom:4px;color:#1e293b">KPI填報系統</div>
    <div style="font-size:.83rem;color:#64748b;margin-bottom:20px">請輸入密碼以繼續</div>
    <input id="pw-input" type="password" placeholder="輸入密碼" autocomplete="off"
      style="width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:1rem;font-family:inherit;outline:none;margin-bottom:8px;text-align:center;letter-spacing:.15em"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-err" style="color:#dc2626;font-size:.8rem;min-height:18px;margin-bottom:8px"></div>
    <button onclick="checkPw()" style="width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit">進入</button>
  </div>
</div>

<!-- ── Sidebar ── -->
<nav id="sb">
  <div id="sb-logo">
    <div class="lg">📊</div>
    <span>KPI填報</span>
  </div>
  <div class="sb-sec">分類</div>
  <div id="sb-groups"><div style="padding:12px 16px;font-size:.75rem;color:#64748b">載入中…</div></div>
</nav>

<div id="sb-resize"></div>

<!-- ── Right Panel ── -->
<div id="rp-resize"></div>
<div id="rpanel">
  <div id="rp-hdr">
    <span>📋 表單</span>
  </div>
  <div id="rp-body"><div class="ld" style="padding:24px;font-size:.8rem;text-align:center">載入中…<br><div class="sp" style="margin:10px auto"></div></div></div>
</div>

<!-- ── Main ── -->
<div id="main">
  <!-- Top Bar -->
  <div id="topbar">
    <span style="font-size:.77rem;color:var(--muted)">字體</span>
    <button class="tb-btn" onclick="changeFs(-1)">A−</button>
    <button class="tb-btn" onclick="changeFs(0)" title="重設">↺</button>
    <button class="tb-btn" onclick="changeFs(1)">A+</button>
    <div class="tb-div"></div>
    <button class="tb-btn" onclick="reloadItems()">↻ 重新整理</button>
  </div>

  <!-- Content -->
  <div id="cnt">
    <div id="ghdr" style="margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <h2 id="gtitle" style="flex:1;margin:0">載入中…</h2>
      </div>
    </div>

    <div id="fbar">
      <span class="flabel">🔍 負責人</span>
      <div class="fsearch">

<script>
// ════ State ════
let currentGroup = 1;
let allItems = [], filterName = '', filterYear = '', filterFill = '', expandedId = null;
let sidebarGroups = [];
const _detCache = {}; // wiId → 上次載入的完整資料（stale-while-revalidate 用）
const _openPanels = new Set(); // 追蹤目前展開的 ppanel id，inv() 重建後恢復

const ALL_NAMES = ['張怡雅','林志鴻','蔡金杏','簡麗瑜','吳美玲','陳妙絹','許瑜庭',
                   '黃惠玲','鄭麗菁','蔡明芬','林淑棻','趙莉芬','王毅新','陳偉婷',
                   '楊馥宇','林偉民','張麗娟','羅永桂','院長']
                   .sort((a,b)=>a.localeCompare(b,'zh-TW',{collation:'stroke'}));

// ════ Init ════
window.onload = () => {
  const dl = document.getElementById('namesList');
  if (dl) ALL_NAMES.forEach(n => { const o = document.createElement('option'); o.value = n; dl.appendChild(o); });
  loadGroups(); loadItems();
  loadAllForms(); // 右側表單面板（全站去重）
};

function loadItems() {
  setLoading(true);
  google.script.run
    .withSuccessHandler(items => {
      allItems = items; setLoading(false); updateCounts(); render();
      prefetchGroupDetails(currentGroup); // 暖快取，讓點進去時瞬間顯示
    })
    .withFailureHandler(e => { setLoading(false, e&&e.message?e.message:'伺服器無回應，請重試'); })
    .getAllWorkItems();
}
function reloadItems() { loadItems(); }

function loadGroups() {
  const _fallback = [
    {id:1,name:'課程、實習&行政&教學組',color:'#4f46e5',icon:'📚'},
    {id:2,name:'師資培育(教學組簡麗瑜)',color:'#0891b2',icon:'👩‍🏫'},
    {id:3,name:'產官學(產學組許瑜庭)',color:'#059669',icon:'💼'},
    {id:4,name:'國際合作研究交流(研究組&行政教學)',color:'#d97706',icon:'🌏'},
    {id:5,name:'環境設備(教學&產學組)',color:'#dc2626',icon:'🔧'},
    {id:6,name:'其他行政(系院中心)',color:'#7c3aed',icon:'📋'}
  ];
  google.script.run
    .withSuccessHandler(groups => {
      sidebarGroups = (groups && groups.length) ? groups : _fallback;
      if (!sidebarGroups.find(g=>g.id===currentGroup)) currentGroup = sidebarGroups[0].id;
      buildSidebarGroups();
      updateCounts();
    })
    .withFailureHandler(() => {
      sidebarGroups = _fallback;
      buildSidebarGroups();
      updateCounts();
    })
    .getGroups();
}

function buildSidebarGroups() {
  const container = document.getElementById('sb-groups');
  if (!container) return;
  container.innerHTML = sidebarGroups.map(g => `
    <div class="sb-item${Number(g.id)===Number(currentGroup)?' active':''}" data-g="${g.id}" onclick="switchGroup(${g.id})">
      <div class="sb-icon" style="background:${g.color||'#4f46e5'}">${g.icon||'📋'}</div>
      <span class="sb-name">${esc(g.name)}</span>
      <span class="sb-cnt" id="c${g.id}">─</span>
    </div>`).join('');
  // Sync Add WI modal group select
  const sel = document.getElementById('wiGrp');
  if (sel) sel.innerHTML = sidebarGroups.map(g=>`<option value="${g.id}">${g.id} ${esc(g.name)}</option>`).join('');
}

function updateCounts() {
  sidebarGroups.forEach(g => {
    const el = document.getElementById('c'+g.id);
    if (el) el.textContent = allItems.filter(i=>String(i.GroupID)===String(g.id)).length;
  });
}

// ════ Render ════
function render() {
  const isDash = currentGroup === 0;
  document.getElementById('wiList').style.display = isDash?'none':'block';
  document.getElementById('dview').style.display  = isDash?'block':'none';
  document.getElementById('fbar').style.display   = isDash?'none':'flex';

  if (isDash) { updateGHeader(); renderDash(); return; }
  document.getElementById('ghdr').style.marginBottom='14px';

  let items = allItems.filter(i=>String(i.GroupID)===String(currentGroup));
  if (filterName) {
    const q = filterName.toLowerCase();
    items = items.filter(i =>
      (i._teachers||[]).some(t=>t.toLowerCase().includes(q)) ||
      (i._coOrgs||[]).some(t=>t.toLowerCase().includes(q))
    );
  }
  if (filterYear) {
    const roc = parseInt(filterYear);
    if (!isNaN(roc)) {
      const adYr = roc + 1911;
      items = items.filter(i => {
        if (!i.Period) return true;
        const nums = (i.Period.match(/\d{4}/g)||[]).map(Number);
        if (!nums.length) return true;
        return adYr >= Math.min(...nums) && adYr <= Math.max(...nums);
      });
    }
  }
  if (filterFill==='filled')   items = items.filter(i=>i._hasFill);
  if (filterFill==='unfilled') items = items.filter(i=>!i._hasFill);
  if (!showArchived) items = items.filter(i=>!isArchived(i.ID));

  updateGHeader();

  const list = document.getElementById('wiList');
  if (!items.length) { list.innerHTML='<div class="emp">此條件下無工作項目</div>'; return; }
  list.innerHTML = items.map((wi,i)=>buildCard(wi,i+1)).join('');
  if (expandedId) {
    const c = document.getElementById('wc_'+expandedId);
    if (c) { c.classList.add('open'); loadDetail(expandedId); }
  }
}

function updateGHeader() {
  const g = sidebarGroups.find(g=>Number(g.id)===Number(currentGroup));
  document.getElementById('gtitle').textContent = currentGroup===0 ? '數據儀表板' : (g?g.name:'');
}

// ════ Build Card ════
function buildCard(wi, n) {
  const badge = wi._hasFill
    ? '<span class="wbadge bdone">✓ 已填寫</span>'
    : '<span class="wbadge bpend">待填寫</span>';
  const pav=`<span class="pav" style="background:#e0e7ff;color:#4338ca"><svg viewBox="0 0 20 20" fill="currentColor" width="11" height="11"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg></span>`;
  const coav=`<span class="pav" style="background:#d1fae5;color:#065f46"><svg viewBox="0 0 20 20" fill="currentColor" width="11" height="11"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg></span>`;
  const teachers=(wi._teachers||[]).slice(0,3);
  const coOrgs=(wi._coOrgs||[]).slice(0,3);
  const tChips=teachers.map(t=>`<span class="pchip" onclick="event.stopPropagation();setPerson('${esc(t)}')" style="cursor:pointer;text-decoration:underline dotted" title="篩選${esc(t)}">${pav}${t}</span>`).join('');
  const cChips=coOrgs.map(t=>`<span class="pchip" onclick="event.stopPropagation();setPerson('${esc(t)}')" style="cursor:pointer;text-decoration:underline dotted;color:#065f46" title="篩選${esc(t)}">${coav}${t}</span>`).join('');
  const ppl=[
    teachers.length?`<span style="font-size:.68rem;color:var(--navy);font-weight:700">負責教師：</span>${tChips}`:'',
    coOrgs.length?`<span style="font-size:.68rem;color:var(--navy);font-weight:700;margin-left:6px">協辦人員：</span>${cChips}`:''
  ].filter(Boolean).join('');

  const isArch=isArchived(wi.ID);
  return `
  <div class="wcard${isArch?' arch-item':''}" id="wc_${wi.ID}">
    <div class="whead" onclick="toggleCard('${wi.ID}')">
      <div class="wnum">${wi.ItemNo||n}</div>
      <div class="winfo">
        <div class="wtitle">${esc(wi.Title)}${isArch?' <span style="font-size:.7rem;color:var(--muted)">[封存]</span>':''}</div>
        <div class="wppl">${ppl}</div>
      </div>
    </div>
    <div class="wbody" id="wb_${wi.ID}">
      <div id="wc2_${wi.ID}"><div class="ld" style="padding:16px"><div class="sp"></div></div></div>
    </div>
  </div>`;
}

function toggleCard(id) {
  const c = document.getElementById('wc_'+id);
  const wasOpen = c.classList.contains('open');
  document.querySelectorAll('.wcard.open').forEach(x=>x.classList.remove('open'));
  _openPanels.clear(); // 卡片關閉時清除面板狀態
  if (!wasOpen) { c.classList.add('open'); expandedId=id; loadDetail(id); }
  else expandedId=null;
}

// ════ Detail ════
function _applyBandClosed(cont) {
  cont.querySelectorAll('.band.band-closed .bcnt>*:not(.btitle)').forEach(el=>el.style.display='none');
}

function loadDetail(wiId) {
  const cont = document.getElementById('wc2_'+wiId);
  if (cont.dataset.loaded==='1') return;
  // 有 cache：立即渲染（感覺瞬間），不顯示轉圈
  if (_detCache[wiId]) {
    cont.innerHTML = buildDetail(_detCache[wiId]);
    cont.dataset.loaded = '1';
    _applyBandClosed(cont);
    return;
  }
  // 無 cache：顯示轉圈等待
  google.script.run
    .withSuccessHandler(d => {
      if (!d) { cont.innerHTML='<div class="emp">載入失敗</div>'; return; }
      _detCache[wiId] = d;
      cont.innerHTML = buildDetail(d);
      cont.dataset.loaded='1';
      _applyBandClosed(cont);
    })
    .withFailureHandler(()=>{ cont.innerHTML='<div class="emp">載入失敗</div>'; })
    .getWorkItemFull(wiId);
}

function buildDetail(d) {
  const twoCol = `
    <div style="display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)">
      <div style="border-right:1px solid var(--border)">${buildPlannedBand(d,true)}</div>
      <div>${buildKPIBand(d,true)}</div>
    </div>`;
  // 順序：本月執行狀況(新增表單) → 預計下個月 → 執行狀況 → 工作內容/KPI → 關聯表單 → Footer
  return buildExecAdd(d) + buildNextMonthBand(d) + buildExecBand(d) + twoCol + buildFormsBand(d) + buildFooter(d) + buildPlanned(d);
}

// ── 預計下個月工作項目 Band ──
function buildNextMonthBand(d) {
  const items = (d.pool_next||[]).slice().reverse();
  const rows = items.map(p=>`
    <div style="display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px dashed #c4b5fd;font-size:.83rem">
      <input type="checkbox" value="${p.ID}" class="pncb" style="margin-top:4px;flex-shrink:0">
      <div data-pnid="${p.ID}" style="flex:1;white-space:pre-wrap;line-height:1.5">${esc(p.Content)}</div>
      <button class="btn btn-o btn-sm" onclick="event.stopPropagation();editPoolNext('${p.ID}','${d.ID}')" title="修改">✎</button>
      <button class="btn btn-d btn-sm" onclick="event.stopPropagation();delPoolNext('${p.ID}','${d.ID}')">✕</button>
    </div>`).join('');
  const mvRow = items.length ? `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap">
      <button class="btn btn-sm" style="background:#7c3aed;color:#fff;border:none" onclick="event.stopPropagation();moveNextToPool2('${d.ID}')">✅ 轉入本月執行狀況</button>
      <span style="font-size:.71rem;color:var(--muted)">勾選後點此按鈕執行</span>
    </div>` : '';
  return `
  <div class="band" style="background:#faf5ff;border-top:1px solid var(--border)">
    <div class="bico">📅</div>
    <div class="bcnt">
      <div class="btitle" style="color:#7c3aed">預計下個月工作項目</div>
      ${mvRow}
      <div style="max-height:200px;overflow-y:auto;padding-right:2px;margin-bottom:6px" id="pnList_${d.ID}">
        ${rows||'<span style="color:#a78bfa;font-size:.8rem">尚無預計下月工作</span>'}
      </div>
      <div style="display:flex;gap:5px;align-items:flex-end">
        <textarea id="pnTxt_${d.ID}" style="flex:1;padding:5px 8px;border:1px solid #c4b5fd;border-radius:5px;font-size:.8rem;font-family:inherit;resize:vertical;min-height:54px;background:#fff" placeholder="預計下個月要做的工作…"></textarea>
        <button class="btn btn-sm" style="background:#7c3aed;color:#fff;border:none;height:32px" onclick="event.stopPropagation();addPoolNext('${d.ID}')">新增</button>
      </div>
    </div>
  </div>`;
}

// ── Planned Band (always visible) ──
function buildPlannedBand(d, inner=false) {
  const archP = getArchivedPlanned();
  const visP  = (d.planned||[]).filter(p=>!archP.includes(p.ID));
  const hidP  = (d.planned||[]).filter(p=>archP.includes(p.ID));
  const prows = visP.map((p,i)=>`
    <div style="display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px dashed var(--purple-b);font-size:.82rem">
      <span style="font-size:.73rem;font-weight:700;color:var(--purple);flex-shrink:0;margin-top:3px;min-width:18px">${i+1}.</span>
      <div style="flex:1;line-height:1.55;white-space:pre-wrap">${esc(p.Content)}</div>
      <span style="font-size:.72rem;color:var(--muted);white-space:nowrap;padding-top:2px">${p.PlannedDate||''} ${p.Year?p.Year+'年':''}</span>
    </div>`).join('');
  const hidRows = hidP.map(p=>`
    <div style="display:flex;align-items:center;gap:6px;padding:3px 6px;background:rgba(0,0,0,.04);border-radius:5px;margin-bottom:3px;opacity:.45">
      <span style="font-size:.77rem;flex:1;color:var(--muted)">🗃 ${esc(p.Content.substring(0,35))}${p.Content.length>35?'…':''} ${p.Year?p.Year+'年':''}</span>
      <button class="btn btn-o btn-sm" onclick="event.stopPropagation();togglePlannedArchive('${p.ID}','${d.ID}')" style="font-size:.68rem">取消封存</button>
    </div>`).join('');
  return `<div class="band band-purple band-closed"${inner?' style="border-top:none;height:100%;box-sizing:border-box"':''}>
    <div class="bico">📋</div>
    <div class="bcnt">
      <div class="btitle">工作內容<button class="band-toggle" onclick="event.stopPropagation();toggleBand(this)">▼</button></div>
      <div style="height:180px;min-height:60px;max-height:600px;overflow-y:auto;margin-bottom:4px;padding-right:2px;resize:vertical;">
        ${prows||(!hidP.length?'<span style="color:var(--muted);font-size:.8rem">尚無預計工作內容</span>':'')}
        ${hidRows}
      </div>
      <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap">
        <textarea id="aPc2_${d.ID}" style="flex:1;min-width:140px;padding:5px 8px;border:1px solid var(--purple-b);border-radius:5px;font-size:.79rem;font-family:inherit;resize:vertical;min-height:80px;background:#fff" placeholder="新增預計工作內容…"></textarea>
        <div style="display:flex;flex-direction:column;gap:4px">
          <input id="aPy2_${d.ID}" style="width:88px;padding:5px 8px;border:1px solid var(--purple-b);border-radius:5px;font-size:.79rem;font-family:inherit;background:#fff" placeholder="年度">
          <button class="btn btn-sm" style="background:var(--purple);color:#fff;border:none" onclick="event.stopPropagation();addPlanned2('${d.ID}')">新增</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ── KPI Band ──
function buildKPIBand(d, inner=false) {
  const kpis = d.kpis||[];
  const archivedKPIs = getArchivedKPIs();
  const visibleKpis = kpis.filter(k => !archivedKPIs.includes(k.ID));
  const hiddenCount = kpis.length - visibleKpis.length;
  const rows = visibleKpis.map((k, idx) => {
    const isMilestone = (k.TargetType||'number') === 'milestone';
    const isYBool = k.IsYearBased === true || String(k.IsYearBased).toLowerCase() === 'true';
    const kYearStr = String(k.Year || '');
    const allowedYearsArr = (isYBool && kYearStr)
      ? kYearStr.split(',').map(y=>y.trim()).filter(y=>y) : [];

    // 達成記錄列（顯示年月＋達成值）
    const achRows = (k.achievements||[]).map(a=>{
      const aYear = String(a.Year||'').trim();
      const aMonth = (a.Month!==null && a.Month!==undefined && a.Month!=='') ? String(a.Month) : '';
      const datePart = (aYear ? aYear+'年' : '') + (aMonth ? aMonth+'月' : '');
      const isWrong = allowedYearsArr.length>0 && aYear && !allowedYearsArr.includes(aYear);
      const valStr = String(a.ActualValue||'').trim();
      const emptyVal = (valStr==='' || valStr==='0');
      return '<div style="display:flex;align-items:center;gap:5px;font-size:.76rem;padding:2px 0'
        +(isWrong?';background:#fff1f2;border-radius:3px;padding:2px 6px':emptyVal?';background:#fffbeb;border-radius:3px;padding:2px 6px':'')+'">'
        +'<span style="min-width:66px;color:'+(isWrong?'var(--red)':'var(--muted)')+'">'+( datePart||'─')+'</span>'
        +(emptyVal
          ? '<span style="color:var(--amber);font-size:.72rem">⚠️ 達成值未填，請刪除重填</span>'
          : '<span style="font-weight:700;color:var(--text);font-size:.84rem">'+esc(valStr)+'</span>'
        )
        +(isWrong?'<span style="color:var(--red);font-size:.68rem;white-space:nowrap;margin-left:4px">⚠️年度不符不計入</span>':'')
        +'<button class="btn btn-d btn-sm" style="margin-left:auto" onclick="event.stopPropagation();delKPIAch(\''+a.ID+'\',\''+d.ID+'\')">✕</button>'
        +'</div>';
    }).join('');

    // 前端重新計算達成率（直接從原始資料算，不依賴後端快取）
    const targetNum = parseFloat(k.TargetValue)||0;
    let actualSum = 0;
    let pct = null;
    if (!isMilestone && targetNum>0) {
      let forCalc = k.achievements||[];
      if (isYBool && kYearStr) {
        forCalc = forCalc.filter(a=>allowedYearsArr.includes(String(a.Year||'').trim()));
      } else if (isYBool && !kYearStr) {
        forCalc = []; // 分年度無特定年：由各年條形圖處理
      }
      if (forCalc.length>0) {
        actualSum = forCalc.reduce((s,r)=>s+(parseFloat(r.ActualValue)||0),0);
        pct = Math.min(Math.round(actualSum/targetNum*100),100);
      }
    }
    if (isMilestone) pct = k.achievementPct; // 里程碑：保留後端值

    const kpiC = p => p==null?'var(--muted)':p>=100?'var(--green)':p>=60?'var(--amber)':'var(--red)';
    let progressBar = '';
    if (isMilestone && pct) {
      progressBar = '<div style="font-size:.75rem;color:var(--green);margin-top:3px">✓ '+esc(String(pct))+'</div>';
    } else if (!isMilestone && k.yearlyAchievements && k.yearlyAchievements.length) {
      // 分年度：每年獨立進度條（含 X/Y 顯示）
      progressBar = '<div style="margin:5px 0 3px">'+k.yearlyAchievements.map(ya=>{
        const c=kpiC(ya.pct);
        return '<div style="margin-bottom:4px">'
          +'<div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:1px">'
          +'<span>'+ya.year+'年</span>'
          +'<span style="font-weight:700;color:'+c+'">'+ya.actual+' / '+esc(String(k.TargetValue||'─'))+' = '+(ya.pct!=null?ya.pct+'%':'─')+'</span>'
          +'</div>'
          +'<div style="background:#dbeafe;border-radius:99px;height:5px;overflow:hidden">'
          +'<div style="width:'+(ya.pct||0)+'%;height:100%;border-radius:99px;background:'+c+';transition:width .5s"></div>'
          +'</div></div>';
      }).join('')+'</div>';
    } else if (!isMilestone && typeof pct==='number') {
      const c=kpiC(pct);
      progressBar = '<div style="margin:5px 0 2px">'
        +'<div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:2px">'
        +'<span>達成率</span>'
        +'<span style="font-weight:700;color:'+c+'">'+actualSum+' / '+esc(String(k.TargetValue))+' = '+pct+'%</span>'
        +'</div>'
        +'<div style="background:#dbeafe;border-radius:99px;height:7px;overflow:hidden">'
        +'<div style="width:'+pct+'%;height:100%;border-radius:99px;background:'+c+';transition:width .5s"></div>'
        +'</div></div>';
    }

    return `
    <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed var(--blue-b);last-child:border-bottom:none">
      <div class="krow" style="border-bottom:none;margin-bottom:3px;padding-bottom:0">
        <span class="ktext">🎯 ${esc(k.KPIText)}</span>
        ${k.IsYearBased ? `<span style="display:inline-flex;gap:3px;align-items:center;flex-wrap:wrap;margin-left:4px"><span style="font-size:.69rem;color:var(--muted)">適用年度：</span>${(String(k.Year||'')).split(',').filter(y=>y.trim()).map(y=>`<span class="ktag">${y.trim()}年</span>`).join('')||'<span class="ktag">分年度</span>'}</span>` : ''}
        <div class="kact"></div>
      </div>
      ${achRows ? `<div style="background:rgba(255,255,255,.6);border-radius:5px;padding:5px 8px;margin-top:4px">${achRows}</div>` : ''}
    </div>`;
  }).join('');

  const archivedRows = kpis.filter(k => archivedKPIs.includes(k.ID)).map(k=>`
    <div style="display:flex;align-items:center;gap:6px;padding:4px 6px;background:rgba(0,0,0,.04);border-radius:5px;margin-bottom:4px;opacity:.45">
      <span style="font-size:.78rem;flex:1;color:var(--muted)">🗃 ${esc(k.KPIText)}</span>
      <button class="btn btn-o btn-sm" onclick="event.stopPropagation();toggleKPIArchive('${k.ID}','${esc(k.KPIText)}','${d.ID}')" style="font-size:.68rem;opacity:.7">取消封存</button>
    </div>`).join('');
  return `
  <div class="band band-blue band-closed"${inner?' style="border-top:none;height:100%;box-sizing:border-box"':''}>
    <div class="bico">🎯</div>
    <div class="bcnt">
      <div class="btitle">KPI<button class="band-toggle" onclick="event.stopPropagation();toggleBand(this)">▼</button></div>
      <div style="height:220px;min-height:80px;max-height:700px;overflow-y:auto;padding-right:2px;resize:vertical;">
        ${rows||(!archivedRows?'<span style="color:#94a3b8;font-size:.8rem">尚無KPI</span>':'')}
        ${archivedRows}
      </div>
      <button class="btn-add" style="margin-top:4px;border-color:var(--blue-b);background:var(--blue-l);color:var(--blue)" onclick="event.stopPropagation();showAddKPI('${d.ID}')">＋ 新增KPI</button>
    </div>
  </div>`;
}

// ════ Dashboard ════
function renderDash() {
  const dv = document.getElementById('dview');
  dv.innerHTML = '<div class="ld"><div class="sp"></div><br>載入中…</div>';
  google.script.run
    .withSuccessHandler(data => {
      const fillPct = data.total ? Math.round(data.filled/data.total*100) : 0;
      const kpiColor = p => p==null?'var(--muted)':p>=100?'var(--green)':p>=60?'var(--amber)':'var(--red)';

      const GPAL=[
        {bg:'#eef2ff',accent:'#4f46e5',border:'#c7d2fe'},
        {bg:'#ecfeff',accent:'#0891b2',border:'#a5f3fc'},
        {bg:'#ecfdf5',accent:'#059669',border:'#a7f3d0'},
        {bg:'#fffbeb',accent:'#d97706',border:'#fde68a'},
        {bg:'#fef2f2',accent:'#dc2626',border:'#fecaca'},
        {bg:'#f5f3ff',accent:'#7c3aed',border:'#ddd6fe'},
      ];
      const groupCards = data.groupStats.map((g,i) => {
        const pal=GPAL[i]||GPAL[0];
        const gFillPct = g.total ? Math.round(g.filled/g.total*100) : 0;
        const kp = g.avgKpiPct;
        const kpiDetails = (g.kpiDetails||[]);

        const mainBar = kp!=null
          ? `<div style="background:#e2e8f0;border-radius:99px;height:8px;overflow:hidden;margin:5px 0 2px">
               <div style="width:${kp}%;height:100%;border-radius:99px;background:${kpiColor(kp)};transition:width .5s"></div></div>
             <div style="font-size:.72rem;color:var(--muted);display:flex;gap:10px;margin-top:2px">
               <span>KPI達成：<b style="color:${kpiColor(kp)}">${kp}%</b></span><span>填報：${gFillPct}%</span><span>共${g.total}項</span></div>`
          : `<div style="background:#e2e8f0;border-radius:99px;height:8px;overflow:hidden;margin:5px 0 2px">
               <div style="width:${gFillPct}%;height:100%;border-radius:99px;background:var(--green);transition:width .5s"></div></div>
             <div style="font-size:.72rem;color:var(--muted);display:flex;gap:10px;margin-top:2px">
               <span>填報：${gFillPct}%</span><span>${g.filled}已填</span><span>共${g.total}項</span></div>`;

        const kpiList = kpiDetails.length ? `
          <div style="margin-top:6px;border-top:1px dashed ${pal.border};padding-top:5px">
            ${kpiDetails.map(k=>`
              <div style="margin-bottom:5px">
                <div style="display:flex;justify-content:space-between;font-size:.73rem;margin-bottom:2px;gap:4px">
                  <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(k.text)}">${esc(k.text)}</span>
                  <span style="white-space:nowrap;font-weight:700;color:${kpiColor(k.pct)}">${k.pct!=null ? k.pct+'%' : '─'}</span>
                </div>
                ${k.pct!=null
                  ? `<div style="background:#e2e8f0;border-radius:99px;height:3px;overflow:hidden"><div style="width:${Math.min(k.pct,100)}%;height:100%;border-radius:99px;background:${kpiColor(k.pct)}"></div></div>`
                  : `<div style="font-size:.68rem;color:var(--muted)">目標：${esc(String(k.target||''))}${k.targetType==='milestone'?' (里程碑)':''}</div>`
                }
              </div>`).join('')}
          </div>` : '';

        return `<div style="background:${pal.bg};border:1px solid ${pal.border};border-left:4px solid ${pal.accent};border-radius:10px;padding:12px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
            <span style="font-weight:700;font-size:.83rem;color:${pal.accent}">${esc(g.name)}</span>
            ${kp!=null
              ? `<span style="font-size:.77rem;font-weight:700;color:${kpiColor(kp)};background:#fff;padding:1px 8px;border-radius:99px;border:1px solid ${pal.border}">KPI ${kp}%</span>`
              : `<span style="font-size:.71rem;color:var(--muted);background:#fff;padding:1px 8px;border-radius:99px;border:1px solid ${pal.border}">共${kpiDetails.length}項KPI</span>`}
          </div>
          ${mainBar}${kpiList}
        </div>`;
      });

      dv.innerHTML = `
        <div class="dgrid">
          <div class="dc"><div class="dbig" style="color:var(--blue)">${data.total}</div><div class="dlbl">工作項目總數</div></div>
          <div class="dc"><div class="dbig" style="color:var(--green)">${data.filled}</div><div class="dlbl">已填報</div></div>
          <div class="dc"><div class="dbig" style="color:var(--amber)">${data.unfilled}</div><div class="dlbl">未填報</div></div>
          <div class="dc"><div class="dbig" style="color:#7c3aed">${fillPct}%</div><div class="dlbl">整體填報率</div></div>
        </div>
        <div style="font-weight:700;margin-bottom:10px;font-size:.87rem">📊 各組 KPI 達成率</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 14px;align-items:start">
          <div>${groupCards.slice(0,3).join('')}</div>
          <div>${groupCards.slice(3).join('')}</div>
        </div>`;
    })
    .withFailureHandler(()=>toast('儀表板載入失敗','err'))
    .getDashboard('','');
}

function updateRPanel() {
  const body = document.getElementById('rp-body');
  if (!body) return;
  if (!_allForms) {
    body.innerHTML = '<div class="ld" style="padding:24px;font-size:.8rem;text-align:center">載入中…<br><div class="sp" style="margin:10px auto"></div></div>';
    return;
  }
  if (!_allForms.length) { body.innerHTML = '<div class="emp">尚無表單</div>'; return; }

  const html = _allForms.map(f => {
    if (!f.FormURL) return '';
    return `<div style="padding:4px 10px"><a class="rp-link" href="${esc(f.FormURL)}" target="_blank">📄 ${esc(f.FormName.replace(/表單/g,''))}</a></div><div class="rp-div"></div>`;
  }).join('');

  const fixed = `<div style="padding:4px 10px"><a class="rp-link" href="https://docs.google.com/spreadsheets/d/1NCP7Bh0k09GN5R_O8WP2ihFmifnEec7U2OE4pjqjiG0/edit?gid=629883937#gid=629883937" target="_blank">📊 彙總表</a></div><div class="rp-div"></div>`;
  body.innerHTML = (html || '<div class="emp">尚無表單連結</div>') + fixed;
}

function showAddWI() { openModal('addWIModal'); }
function submitAddWI() {
  const data={GroupID:document.getElementById('wiGrp').value,ItemNo:document.getElementById('wiNo').value.trim(),Title:document.getElementById('wiTitle').value.trim(),Period:document.getElementById('wiPeriod').value.trim()};
  if(!data.Title){toast('請填寫工作項目名稱','err');return;}
  google.script.run.withSuccessHandler(()=>{toast('新增成功');closeModal('addWIModal');loadItems();}).withFailureHandler(e=>toast('失敗：'+e.message,'err')).saveWorkItem(data);

function showEditWI(id,title,period) {
  const t=decodeHtml(title);
  const nt=prompt('工作項目名稱',t);if(nt===null)return;
  const np=prompt('執行期間',period);if(np===null)return;
  const wi=allItems.find(i=>i.ID===id);if(!wi)return;
  google.script.run.withSuccessHandler(()=>{toast('已更新');inv(id);reloadItems();}).withFailureHandler(e=>toast('失敗','err')).saveWorkItem({...wi,Title:nt,Period:np});
}
function confirmDeleteWI(id,title) {
  if(!confirm('確定刪除「'+decodeHtml(title)+'」？\n此操作無法復原。'))return;
  google.script.run.withSuccessHandler(()=>{toast('已刪除');loadItems();}).withFailureHandler(e=>toast('失敗','err')).deleteWorkItem(id);
}

// ════ KPI CRUD ════
function showAddKPI(wiId) {
  const text=prompt('KPI 內容');if(!text)return;
  const targetTypeRaw=prompt('KPI類型：\n  number  → 數值目標（可計算達成率%）\n  milestone → 里程碑（文字，顯示最新說明）','number');
  const targetType=(targetTypeRaw||'number').trim().toLowerCase()==='milestone'?'milestone':'number';
  const target=prompt(targetType==='number'?'目標值（數字，如 3、80）':'里程碑說明（選填）','');
  const isYear=confirm('是否分年度？');
  const year=isYear?prompt('適用年度（民國年，如 115）',''):'';
  const sumURL=prompt('彙整表URL（可留空）','')||'';
  google.script.run.withSuccessHandler(()=>{toast('KPI新增成功');inv(wiId);}).withFailureHandler(e=>toast('失敗','err'))
    .saveKPI({WorkItemID:wiId,KPIText:text,TargetValue:target,TargetType:targetType,IsYearBased:isYear,Year:year,SummaryURL:sumURL});
}
function showEditKPI(k) {
  const text=prompt('KPI內容',k.KPIText);if(text===null)return;
  const targetType=(k.TargetType||'number')==='milestone'?'milestone':'number';
  const target=prompt(targetType==='number'?'目標值（數字）':'里程碑說明（選填）',k.TargetValue||'');
  const isYear=confirm('是否分年度？');
  const year=isYear?prompt('適用年度',k.Year||''):'';
  google.script.run.withSuccessHandler(()=>{toast('已更新');inv(k.WorkItemID);}).withFailureHandler(e=>toast('失敗','err'))
    .saveKPI({...k,KPIText:text,TargetValue:target,IsYearBased:isYear,Year:year});
}
function delKPI(id,wiId) {
  if(!confirm('確定刪除此KPI？'))return;
  google.script.run.withSuccessHandler(()=>{toast('已刪除');inv(wiId);}).withFailureHandler(e=>toast('失敗','err')).deleteKPI(id);
}

// ════ KPI Achievement CRUD ════
function addKPIAch(kpiId, wiId, kpiYear, isYearBased) {
  const vEl=document.getElementById('achV_'+kpiId);
  const yEl=document.getElementById('achY_'+kpiId);
  const mEl=document.getElementById('achMo_'+kpiId);
  const nEl=document.getElementById('achN_'+kpiId);
  const val=(vEl&&vEl.value.trim())||'';
  const year=(yEl&&yEl.value.trim())||'';
  const month=(mEl&&mEl.value.trim())||'';
  const note=(nEl&&nEl.value.trim())||'';
  if(!val){toast('請填寫實際達成值','err');return;}
  // ── 年度驗證（分年度KPI才做）──
  if(isYearBased && kpiYear){
    const allowed=String(kpiYear).split(',').map(y=>y.trim()).filter(y=>y);
    if(allowed.length){
      if(!year){
        toast('⚠️ 此KPI適用年度為 '+kpiYear+' 年，請填入年度欄位','err');
        if(yEl){yEl.style.border='1.5px solid var(--red)';yEl.focus();}
        return;
      }
      if(!allowed.includes(year)){
        toast('❌ 年度不符：此KPI適用 '+allowed.join('/')+'年，您輸入 '+year+' 年（不計入達成率）','err');
        if(yEl){yEl.style.border='1.5px solid var(--red)';yEl.focus();}
        return;
      }
    }
  }
  if(yEl)yEl.style.border='';
  google.script.run
    .withSuccessHandler(()=>{toast('達成記錄已儲存');if(vEl)vEl.value='';if(mEl)mEl.value='';if(nEl)nEl.value='';inv(wiId);})
    .withFailureHandler(e=>toast('儲存失敗：'+(e.message||e),'err'))
    .saveKPIAchievement({KPIID:kpiId,WorkItemID:wiId,Year:year,Month:month,ActualValue:val,Note:note});
}
function delKPIAch(achId, wiId) {
  if(!confirm('確定刪除此達成記錄？'))return;
  google.script.run
    .withSuccessHandler(()=>{toast('已刪除');inv(wiId);})
    .withFailureHandler(e=>toast('刪除失敗','err'))
    .deleteKPIAchievement(achId);
}

function openPeoplePanel(wiId){
  const card=document.getElementById('wc_'+wiId);
  const wasOpen=card.classList.contains('open');
  if(!wasOpen){
    document.querySelectorAll('.wcard.open').forEach(x=>x.classList.remove('open'));
    card.classList.add('open');
    expandedId=wiId;
    const cont=document.getElementById('wc2_'+wiId);
    if(cont.dataset.loaded==='1'){setTimeout(()=>togglePanel('pp_'+wiId),30);}
    else{
      google.script.run
        .withSuccessHandler(d=>{
          if(!d){cont.innerHTML='<div class="emp">載入失敗</div>';return;}
          cont.innerHTML=buildDetail(d);
          cont.dataset.loaded='1';
          setTimeout(()=>togglePanel('pp_'+wiId),50);
        })
        .withFailureHandler(()=>{cont.innerHTML='<div class="emp">載入失敗</div>';})
        .getWorkItemFull(wiId);
    }
  }else{
    togglePanel('pp_'+wiId);
  }
}

// ════ Sidebar Resize ════
(function(){
  const h=document.getElementById('sb-resize');
  if(!h)return;
  let drag=false;
  h.addEventListener('mousedown',e=>{drag=true;h.classList.add('dragging');document.body.style.userSelect='none';document.body.style.cursor='col-resize';e.preventDefault();});
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    const w=Math.min(Math.max(e.clientX,120),440);
    document.documentElement.style.setProperty('--sw',w+'px');
    document.getElementById('sb').style.width=w+'px';
    h.style.left=(w-4)+'px';
    document.getElementById('main').style.marginLeft=w+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!drag)return;
    drag=false;h.classList.remove('dragging');
    document.body.style.userSelect='';document.body.style.cursor='';
  });
})();

// ════ Utils ════
// reloadList=true 才重載側欄卡片清單（人員/池操作需要，KPI/預計/表單不需要）
function inv(wiId, reloadList) {
  const cont = document.getElementById('wc2_'+wiId);
  // 靜默背景刷新：舊內容保留，新資料回來後再換上（不顯示轉圈）
  if (cont) cont.dataset.loaded = '0';
  google.script.run
    .withSuccessHandler(d => {
      if (!d) return;
      _detCache[wiId] = d;
      const c = document.getElementById('wc2_'+wiId);
      if (c) {
        c.innerHTML = buildDetail(d);
        c.dataset.loaded = '1';
        _applyBandClosed(c);
        // 恢復之前開著的 panel（如人員面板）
        _openPanels.forEach(pid => {
          const el = document.getElementById(pid);
          if (el) el.classList.add('open');
        });
      }
    })
    .withFailureHandler(() => {})
    .getWorkItemFull(wiId);
  if (reloadList === true) {
    google.script.run
      .withSuccessHandler(items => { allItems = items; updateCounts(); })
      .withFailureHandler(() => {})
      .getAllWorkItems();
  }
}
// 收合/展開 band 區塊
function toggleBand(btn){
  const band=btn.closest('.band');
  const bcnt=band.querySelector('.bcnt');
  const closed=band.classList.toggle('band-closed');
  btn.textContent=closed?'▼':'▲';
  if(bcnt){
    Array.from(bcnt.children).forEach(child=>{
      if(!child.classList.contains('btitle')){
        child.style.display=closed?'none':'';
      }
    });
  }
}
function validateMonth(el){
  const v=el.value.replace(/[^0-9]/g,'');
  const n=parseInt(v,10);
  if(!v){el.value='';return;}
  if(isNaN(n)||n<1||n>12){el.style.border='1.5px solid var(--red)';el.title='請輸入 1–12 的數字';}
  else{el.style.border='';el.title='';el.value=String(n);}
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function decodeHtml(s){const t=document.createElement('textarea');t.innerHTML=s;return t.value;}
function toast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.style.background=type==='err'?'#dc2626':'#1e293b';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function setLoading(on,errMsg){
  const el=document.getElementById('wiList');
  if(!el)return;
  if(on){el.innerHTML='<div class="ld"><div class="sp"></div><br>載入中…</div>';}
  else if(errMsg){el.innerHTML='<div class="ld" style="color:var(--red)">⚠️ 載入失敗：'+esc(errMsg)+'<br><br><button class="btn btn-o" onclick="loadItems()">↻ 重試</button></div>';}
  // else: render() will overwrite the content itself
}
let _fs=15;
function changeFs(d){
  if(d===0)_fs=15;else _fs=Math.min(Math.max(_fs+d,12),22);
  document.documentElement.style.fontSize=_fs+'px';
  document.documentElement.style.setProperty('--fs',_fs+'px');
  document.body.style.fontSize=_fs+'px';
}

// ════ Password ════
function checkPw() {
  const v = document.getElementById('pw-input').value;
  if (v === '3500') {
    document.getElementById('pw-overlay').style.display = 'none';
    sessionStorage.setItem('kpi_auth','1');
  } else {
    document.getElementById('pw-err').textContent = '密碼錯誤，請重試';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
if (sessionStorage.getItem('kpi_auth') === '1') {
  document.getElementById('pw-overlay').style.display = 'none';
}
</script>
